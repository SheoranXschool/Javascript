<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>
        <b>Type Caster</b>
    </p>
    <input type="text" name="Type" id="inputbox" placeholder="write in me" onkeydown="eventhandler(event)">
    <p id="output"></p>
    <script>
        function eventhandler(e){
            if(e.key){
                write()
            }
        }
       function write(){
        let input = document.querySelector('#output')
        input.innerText = inputbox.value
        }
    </script>
</body>
</html>
